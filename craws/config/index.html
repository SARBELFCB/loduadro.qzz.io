<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Config - loduadro</title>
<style>
  @font-face {
    font-family: 'Komika Axis';
    src: local('Komika Axis');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0b1f0f 0%, #0f2e16 50%, #0b1f0f 100%);
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 30px;
  }

  h1 {
    color: #4dff4d;
    text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080;
    font-size: 3rem;
    text-align: center;
  }

  .config-box {
    background: #0f2e16;
    border: 2px solid #4dff4d;
    border-radius: 16px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 30px #00ff0030;
  }

  .config-box label {
    font-size: 1.2rem;
    color: #c8ffc8;
    text-align: center;
  }

  .config-box input {
    width: 120px;
    text-align: center;
    background: #0b1f0f;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 8px;
    padding: 10px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1.3rem;
  }

  .config-box input:focus {
    outline: none;
    box-shadow: 0 0 15px #00ff0090;
  }

  .action-button {
    background: linear-gradient(145deg, #1c4d1c, #0f3310);
    border: 2px solid #4dff4d;
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    font-size: 1.5rem;
    padding: 15px 40px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 15px #00ff0040;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-block;
  }

  .action-button:hover {
    background: linear-gradient(145deg, #2a6e2a, #1c4d1c);
    box-shadow: 0 0 25px #00ff0090;
    transform: scale(1.05);
  }

  .saved-msg {
    color: #4dff4d;
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .saved-msg.show {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="google_translate_element" style="position: fixed; top: 20px; right: 20px; z-index: 500;"></div>
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({pageLanguage: 'es', autoDisplay: true}, 'google_translate_element');
  }
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <h1>Config</h1>

  <div class="config-box">
    <label for="layersInput">Cantidad de loadstrings para "Troll obfuscation"<br>(numero de capas)</label>
    <input type="number" id="layersInput" min="1" max="50" value="3">
    <button class="action-button" id="saveBtn">Guardar</button>
    <div class="saved-msg" id="savedMsg">Guardado!</div>
  </div>

  <a href="../" class="action-button">Volver</a>

<script>
  const layersInput = document.getElementById('layersInput');
  const saveBtn = document.getElementById('saveBtn');
  const savedMsg = document.getElementById('savedMsg');

  const stored = parseInt(localStorage.getItem('craws_troll_layers'), 10);
  if (!isNaN(stored) && stored >= 1) {
    layersInput.value = stored;
  }

  saveBtn.addEventListener('click', () => {
    let value = parseInt(layersInput.value, 10);
    if (isNaN(value) || value < 1) value = 1;
    if (value > 50) value = 50;
    layersInput.value = value;

    localStorage.setItem('craws_troll_layers', value);

    savedMsg.classList.add('show');
    setTimeout(() => savedMsg.classList.remove('show'), 1500);
  });
</script>

</body>
</html>
