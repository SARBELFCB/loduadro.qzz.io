<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Raw - loduadro</title>
<style>
  @font-face {
    font-family: 'Komika Axis';
    src: local('Komika Axis');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0b1f0f 0%, #0f2e16 50%, #0b1f0f 100%);
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 30px;
  }

  h1 {
    color: #4dff4d;
    text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080;
    font-size: 3rem;
    text-align: center;
  }

  textarea {
    width: 100%;
    max-width: 800px;
    height: 350px;
    background: #0f2e16;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    resize: vertical;
    box-shadow: 0 0 15px #00ff0040;
  }

  textarea:focus {
    outline: none;
    box-shadow: 0 0 25px #00ff0090;
  }

  .action-button {
    background: linear-gradient(145deg, #1c4d1c, #0f3310);
    border: 2px solid #4dff4d;
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    font-size: 1.5rem;
    padding: 15px 40px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 15px #00ff0040;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-block;
  }

  .action-button:hover {
    background: linear-gradient(145deg, #2a6e2a, #1c4d1c);
    box-shadow: 0 0 25px #00ff0090;
    transform: scale(1.05);
  }

  pre {
    width: 100%;
    max-width: 800px;
    background: #0f2e16;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 20px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    box-shadow: 0 0 15px #00ff0040;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }

  .link-box {
    width: 100%;
    max-width: 800px;
    background: #0f2e16;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.95rem;
    color: #b6ffb0;
    word-break: break-all;
    box-shadow: 0 0 15px #00ff0040;
  }

  #createView, #viewView {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    width: 100%;
  }

  #createView.active, #viewView.active {
    display: flex;
  }
</style>
</head>
<body>

  <h1>Create Raw</h1>

  <div id="createView">
    <textarea id="codeInput" placeholder="Escribe tu codigo aqui..."></textarea>
    <button class="action-button" id="createBtn">Create Raw</button>
  </div>

  <div id="viewView">
    <pre id="rawContent"></pre>
    <div class="link-box" id="rawLink"></div>
    <a href="./" class="action-button">Crear otro Raw</a>
  </div>

  <a href="../" class="action-button">Volver al inicio</a>

<script>
  const createView = document.getElementById('createView');
  const viewView = document.getElementById('viewView');
  const codeInput = document.getElementById('codeInput');
  const createBtn = document.getElementById('createBtn');
  const rawContent = document.getElementById('rawContent');
  const rawLink = document.getElementById('rawLink');

  function encodeCode(text) {
    return btoa(unescape(encodeURIComponent(text)));
  }

  function decodeCode(encoded) {
    return decodeURIComponent(escape(atob(encoded)));
  }

  const hash = window.location.hash.slice(1);

  if (hash) {
    try {
      const decoded = decodeCode(hash);
      rawContent.textContent = decoded;
      rawLink.textContent = window.location.href;
      viewView.classList.add('active');
      document.querySelector('h1').textContent = 'Raw';
    } catch (e) {
      createView.classList.add('active');
    }
  } else {
    createView.classList.add('active');
  }

  createBtn.addEventListener('click', () => {
    const text = codeInput.value;
    if (!text.trim()) return;
    const encoded = encodeCode(text);
    window.location.href = window.location.pathname + '#' + encoded;
    window.location.reload();
  });
</script>

</body>
</html>
