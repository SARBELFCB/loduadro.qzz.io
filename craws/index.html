<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Raw - loduadro</title>
<style>
  @font-face {
    font-family: 'Komika Axis';
    src: local('Komika Axis');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0b1f0f 0%, #0f2e16 50%, #0b1f0f 100%);
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 30px;
  }

  h1 {
    color: #4dff4d;
    text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080;
    font-size: 3rem;
    text-align: center;
  }

  textarea {
    width: 100%;
    max-width: 800px;
    height: 350px;
    background: #0f2e16;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    resize: vertical;
    box-shadow: 0 0 15px #00ff0040;
  }

  textarea:focus {
    outline: none;
    box-shadow: 0 0 25px #00ff0090;
  }

  .action-button {
    background: linear-gradient(145deg, #1c4d1c, #0f3310);
    border: 2px solid #4dff4d;
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    font-size: 1.5rem;
    padding: 15px 40px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 15px #00ff0040;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-block;
  }

  .action-button:hover {
    background: linear-gradient(145deg, #2a6e2a, #1c4d1c);
    box-shadow: 0 0 25px #00ff0090;
    transform: scale(1.05);
  }

  pre {
    width: 100%;
    max-width: 800px;
    background: #0f2e16;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 20px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    box-shadow: 0 0 15px #00ff0040;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }

  .link-box {
    width: 100%;
    max-width: 800px;
    background: #0f2e16;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.95rem;
    color: #b6ffb0;
    word-break: break-all;
    box-shadow: 0 0 15px #00ff0040;
  }

  .pastefy-badge {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(145deg, #6a1b9a, #4a0072);
    color: #e0c3ff;
    font-family: 'Komika Axis', sans-serif;
    font-size: 0.9rem;
    padding: 8px 16px;
    border-radius: 8px;
    border: 2px solid #b388ff;
    box-shadow: 0 0 15px #9c27b080;
    z-index: 200;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-box {
    background: #0f2e16;
    border: 2px solid #4dff4d;
    border-radius: 16px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 30px #00ff0050;
  }

  .modal-box p {
    font-size: 1.3rem;
    margin-bottom: 25px;
    color: #c8ffc8;
  }

  .modal-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .modal-buttons .action-button {
    font-size: 1.2rem;
    padding: 12px 30px;
  }

  .result-box {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .result-textbox {
    width: 100%;
    background: #0f2e16;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    resize: none;
    box-shadow: 0 0 15px #00ff0040;
  }

  .result-textbox:focus {
    outline: none;
  }

  #createView, #resultView {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    width: 100%;
  }

  #createView.active, #resultView.active {
    display: flex;
  }
</style>
</head>
<body>

  <div class="pastefy-badge">USE PASTEFY API</div>

  <h1>Create Raw</h1>

  <div id="createView">
    <textarea id="codeInput" placeholder="Escribe tu codigo aqui..."></textarea>
    <button class="action-button" id="createBtn">Create Raw</button>
  </div>

  <div id="resultView">
    <div class="result-box">
      <textarea class="result-textbox" id="loadstringBox" rows="3" readonly></textarea>
      <button class="action-button" id="copyBtn">Copiar</button>
    </div>
  </div>

  <a href="../" class="action-button">Volver al inicio</a>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <p>Do you want it to use <code>loadstring</code> automatically?</p>
      <div class="modal-buttons">
        <button class="action-button" id="modalYes">Si</button>
        <button class="action-button" id="modalNo">No</button>
      </div>
    </div>
  </div>

<script>
  const createView = document.getElementById('createView');
  const resultView = document.getElementById('resultView');
  const codeInput = document.getElementById('codeInput');
  const createBtn = document.getElementById('createBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalYes = document.getElementById('modalYes');
  const modalNo = document.getElementById('modalNo');
  const loadstringBox = document.getElementById('loadstringBox');
  const copyBtn = document.getElementById('copyBtn');

  createView.classList.add('active');

  async function createPastefyRaw(text) {
    const response = await fetch('https://pastefy.app/api/v2/paste', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: 'loduadro raw',
        content: text,
        type: 'PASTE',
        visibility: 'UNLISTED'
      })
    });

    if (!response.ok) throw new Error('Error al crear el raw');

    const data = await response.json();
    const id = data.paste.id;
    return `https://pastefy.app/${id}/raw`;
  }

  createBtn.addEventListener('click', () => {
    const text = codeInput.value;
    if (!text.trim()) return;
    modalOverlay.classList.add('active');
  });

  modalNo.addEventListener('click', async () => {
    modalOverlay.classList.remove('active');
    createBtn.disabled = true;
    createBtn.textContent = 'Creando...';

    try {
      const rawUrl = await createPastefyRaw(codeInput.value);
      window.location.href = rawUrl;
    } catch (e) {
      alert('Hubo un error al crear el raw. Intenta de nuevo.');
      createBtn.disabled = false;
      createBtn.textContent = 'Create Raw';
    }
  });

  modalYes.addEventListener('click', async () => {
    modalOverlay.classList.remove('active');
    createBtn.disabled = true;
    createBtn.textContent = 'Creando...';

    try {
      const rawUrl = await createPastefyRaw(codeInput.value);
      const loadstringCode = `loadstring(game:HttpGet("${rawUrl}"))()`;

      createView.classList.remove('active');
      resultView.classList.add('active');
      loadstringBox.value = loadstringCode;
    } catch (e) {
      alert('Hubo un error al crear el raw. Intenta de nuevo.');
      createBtn.disabled = false;
      createBtn.textContent = 'Create Raw';
    }
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(loadstringBox.value).then(() => {
      copyBtn.textContent = 'Copiado!';
      setTimeout(() => copyBtn.textContent = 'Copiar', 1500);
    });
  });
</script>

</body>
</html>
