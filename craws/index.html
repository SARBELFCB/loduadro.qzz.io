<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Raw - loduadro</title>
<style>
  @font-face {
    font-family: 'Komika Axis';
    src: local('Komika Axis');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0b1f0f 0%, #0f2e16 50%, #0b1f0f 100%);
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 30px;
  }

  h1 {
    color: #4dff4d;
    text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080;
    font-size: 3rem;
    text-align: center;
  }

  .editor-wrapper {
    position: relative;
    width: 100%;
    max-width: 800px;
    height: 350px;
  }

  .editor-wrapper textarea,
  .editor-wrapper pre {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    line-height: 1.5;
    border-radius: 12px;
    box-sizing: border-box;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow: auto;
  }

  .editor-wrapper textarea {
    background: transparent;
    color: transparent;
    caret-color: #b6ffb0;
    border: 2px solid #4dff4d;
    resize: none;
    z-index: 2;
    box-shadow: 0 0 15px #00ff0040;
  }

  .editor-wrapper textarea:focus {
    outline: none;
    box-shadow: 0 0 25px #00ff0090;
  }

  .editor-wrapper pre {
    background: #0f2e16;
    border: 2px solid transparent;
    color: #b6ffb0;
    z-index: 1;
    pointer-events: none;
  }

  .tok-keyword { color: #ff79c6; }
  .tok-function { color: #66d9ff; }
  .tok-string { color: #ffd866; }
  .tok-comment { color: #6a9955; font-style: italic; }
  .tok-number { color: #c8a2ff; }

  .action-button {
    background: linear-gradient(145deg, #1c4d1c, #0f3310);
    border: 2px solid #4dff4d;
    color: #b6ffb0;
    font-family: 'Komika Axis', sans-serif;
    font-size: 1.5rem;
    padding: 15px 40px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 15px #00ff0040;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-block;
  }

  .action-button:hover {
    background: linear-gradient(145deg, #2a6e2a, #1c4d1c);
    box-shadow: 0 0 25px #00ff0090;
    transform: scale(1.05);
  }

  .pastefy-notice {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #b388ff;
    font-family: 'Komika Axis', sans-serif;
    font-size: 0.9rem;
    text-shadow: 0 0 8px #9c27b080;
    z-index: 200;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-box {
    background: #0f2e16;
    border: 2px solid #4dff4d;
    border-radius: 16px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 30px #00ff0050;
  }

  .modal-box p {
    font-size: 1.3rem;
    margin-bottom: 25px;
    color: #c8ffc8;
  }

  .modal-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .modal-buttons .action-button {
    font-size: 1.2rem;
    padding: 12px 30px;
  }

  .result-box {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .result-textbox {
    width: 100%;
    background: #0f2e16;
    color: #b6ffb0;
    border: 2px solid #4dff4d;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    resize: none;
    box-shadow: 0 0 15px #00ff0040;
  }

  .result-textbox:focus {
    outline: none;
  }

  #createView, #resultView {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    width: 100%;
  }

  #createView.active, #resultView.active {
    display: flex;
  }

  .status-box {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }

  .status-box.active {
    display: flex;
  }

  .status-text {
    font-size: 1.3rem;
    color: #4dff4d;
    text-shadow: 0 0 10px #00ff0090;
    text-align: center;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #1c4d1c;
    border-top: 4px solid #4dff4d;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

  <div class="pastefy-notice">Uses Pastefy API</div>

  <h1>Create Raw</h1>

  <div id="createView">
    <div class="editor-wrapper">
      <pre id="highlightOutput"><code></code></pre>
      <textarea id="codeInput" placeholder="Escribe tu codigo aqui..." spellcheck="false"></textarea>
    </div>
    <button class="action-button" id="createBtn">Create Raw</button>

    <div class="status-box" id="statusBox">
      <div class="status-text" id="statusText">Creating Raw/Loadstring</div>
      <div class="spinner"></div>
    </div>
  </div>

  <div id="resultView">
    <div class="result-box">
      <textarea class="result-textbox" id="loadstringBox" rows="3" readonly></textarea>
      <button class="action-button" id="copyBtn">Copiar</button>
    </div>
  </div>

  <a href="../" class="action-button">Volver al inicio</a>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <p>Do you want to obfuscate the script?</p>
      <div class="modal-buttons">
        <button class="action-button" id="obfYes">Si</button>
        <button class="action-button" id="obfNo">No</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="loadstringModalOverlay">
    <div class="modal-box">
      <p>Do you want it to use <code>loadstring</code> automatically?</p>
      <div class="modal-buttons">
        <button class="action-button" id="modalYes">Si</button>
        <button class="action-button" id="modalNo">No</button>
      </div>
    </div>
  </div>

<script>
  const createView = document.getElementById('createView');
  const resultView = document.getElementById('resultView');
  const codeInput = document.getElementById('codeInput');
  const createBtn = document.getElementById('createBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const obfYes = document.getElementById('obfYes');
  const obfNo = document.getElementById('obfNo');
  const loadstringModalOverlay = document.getElementById('loadstringModalOverlay');
  const modalYes = document.getElementById('modalYes');
  const modalNo = document.getElementById('modalNo');
  const loadstringBox = document.getElementById('loadstringBox');
  const copyBtn = document.getElementById('copyBtn');
  const highlightOutput = document.getElementById('highlightOutput').querySelector('code');
  const statusBox = document.getElementById('statusBox');

  createView.classList.add('active');

  const LUA_KEYWORDS = ['and','break','do','else','elseif','end','false','for','function','goto','if','in','local','nil','not','or','repeat','return','then','true','until','while'];

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function highlightLua(code) {
    const escaped = escapeHtml(code);
    const tokenRegex = /(--\[\[[\s\S]*?\]\]|--.*$|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|\b\d+\.?\d*\b|\b[A-Za-z_][A-Za-z0-9_]*\b(?=\s*\()|\b[A-Za-z_][A-Za-z0-9_]*\b)/gm;

    return escaped.replace(tokenRegex, (match) => {
      if (match.startsWith('--')) {
        return `<span class="tok-comment">${match}</span>`;
      }
      if (match.startsWith('"') || match.startsWith("'")) {
        return `<span class="tok-string">${match}</span>`;
      }
      if (/^\d/.test(match)) {
        return `<span class="tok-number">${match}</span>`;
      }
      if (LUA_KEYWORDS.includes(match)) {
        return `<span class="tok-keyword">${match}</span>`;
      }
      return match;
    }).replace(/\b([A-Za-z_][A-Za-z0-9_]*)\b(?=\()/g, (m, name) => {
      if (LUA_KEYWORDS.includes(name)) return m;
      return `<span class="tok-function">${name}</span>`;
    });
  }

  function updateHighlight() {
    let code = codeInput.value;
    if (code.endsWith('\n')) code += ' ';
    highlightOutput.innerHTML = highlightLua(code);
  }

  codeInput.addEventListener('input', updateHighlight);
  codeInput.addEventListener('scroll', () => {
    highlightOutput.parentElement.scrollTop = codeInput.scrollTop;
    highlightOutput.parentElement.scrollLeft = codeInput.scrollLeft;
  });

  updateHighlight();

  function obfuscateCode(code) {
    const bytes = [];
    for (let i = 0; i < code.length; i++) {
      bytes.push(code.charCodeAt(i));
    }

    const chunks = [];
    for (let i = 0; i < bytes.length; i += 20) {
      chunks.push(bytes.slice(i, i + 20).join(','));
    }

    const tableLines = chunks.map(c => `{${c}}`).join(',\n');

    return `local _0xA={\n${tableLines}\n}\nlocal _0xB=""\nfor _0xC=1,#_0xA do\n  for _0xD=1,#_0xA[_0xC] do\n    _0xB=_0xB..string.char(_0xA[_0xC][_0xD])\n  end\nend\nloadstring(_0xB)()`;
  }

  async function createPastefyRaw(text) {
    const response = await fetch('https://pastefy.app/api/v2/paste', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: 'loduadro raw',
        content: text,
        type: 'PASTE',
        visibility: 'UNLISTED'
      })
    });

    if (!response.ok) throw new Error('Error al crear el raw');

    const data = await response.json();
    const id = data.paste.id;
    return `https://pastefy.app/${id}/raw`;
  }

  let shouldObfuscate = false;

  createBtn.addEventListener('click', () => {
    const text = codeInput.value;
    if (!text.trim()) return;
    modalOverlay.classList.add('active');
  });

  obfYes.addEventListener('click', () => {
    shouldObfuscate = true;
    modalOverlay.classList.remove('active');
    loadstringModalOverlay.classList.add('active');
  });

  obfNo.addEventListener('click', () => {
    shouldObfuscate = false;
    modalOverlay.classList.remove('active');
    loadstringModalOverlay.classList.add('active');
  });

  modalNo.addEventListener('click', async () => {
    loadstringModalOverlay.classList.remove('active');
    createBtn.disabled = true;
    createBtn.textContent = 'Creando...';
    statusBox.classList.add('active');

    try {
      const codeToSend = shouldObfuscate ? obfuscateCode(codeInput.value) : codeInput.value;
      const rawUrl = await createPastefyRaw(codeToSend);
      window.location.href = rawUrl;
    } catch (e) {
      alert('Hubo un error al crear el raw. Intenta de nuevo.');
      createBtn.disabled = false;
      createBtn.textContent = 'Create Raw';
      statusBox.classList.remove('active');
    }
  });

  modalYes.addEventListener('click', async () => {
    loadstringModalOverlay.classList.remove('active');
    createBtn.disabled = true;
    statusBox.classList.add('active');

    const statusTexts = [
      'api pastefy c',
      'api pastefy conect',
      'pastefy call text',
      'pastefy create raw',
      'loduadro.a creating loadstring',
      'loduadro.a get link',
      'process a create loadstring'
    ];

    for (const text of statusTexts) {
      createBtn.textContent = text;
      await new Promise(resolve => setTimeout(resolve, 89));
    }

    try {
      const codeToSend = shouldObfuscate ? obfuscateCode(codeInput.value) : codeInput.value;
      const rawUrl = await createPastefyRaw(codeToSend);
      const loadstringCode = `loadstring(game:HttpGet("${rawUrl}"))()`;

      createBtn.textContent = 'loadstring create';
      await new Promise(resolve => setTimeout(resolve, 89));

      statusBox.classList.remove('active');
      createView.classList.remove('active');
      resultView.classList.add('active');
      loadstringBox.value = loadstringCode;
    } catch (e) {
      alert('Hubo un error al crear el raw. Intenta de nuevo.');
      createBtn.disabled = false;
      createBtn.textContent = 'Create Raw';
      statusBox.classList.remove('active');
    }
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(loadstringBox.value).then(() => {
      copyBtn.textContent = 'Copiado!';
      setTimeout(() => copyBtn.textContent = 'Copiar', 1500);
    });
  });
</script>

</body>
</html>
